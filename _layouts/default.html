<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cuotas de Mantenimiento - Plataforma integral para la gestión de pagos y cobros en condominios">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="author" content="Cloud Empresarial">
    <meta name="keywords" content="condominios, cuotas de mantenimiento, administración, pagos, cobros, Querétaro">

    <meta property="og:title" content="{{ page.title | default: 'Cuotas de Mantenimiento' }}">
    <meta property="og:description" content="Plataforma integral para la gestión de pagos y cobros en condominios">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/cuotasm-logo.jpg' | absolute_url }}">
    <meta property="og:locale" content="es_MX">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ page.title | default: 'Cuotas de Mantenimiento' }}">
    <meta name="twitter:description" content="Plataforma integral para la gestión de pagos y cobros en condominios">

    <link rel="icon" type="image/jpeg" href="{{ '/cuotasm-logo.jpg' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/cuotasm-logo.jpg' | relative_url }}">

    <title>{{ page.title | default: "Cuotas de Mantenimiento" }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/terminal.css' | relative_url }}">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({startOnLoad:false,theme:'dark',fontFamily:'monospace'});
      document.addEventListener('DOMContentLoaded',function(){
        document.querySelectorAll('pre code.language-mermaid').forEach(function(el){
          var div=document.createElement('div');
          div.className='mermaid';
          div.textContent=el.textContent;
          el.parentElement.parentNode.replaceChild(div,el.parentElement);
        });
        if(document.querySelectorAll('.mermaid').length) mermaid.run({nodes:document.querySelectorAll('.mermaid')});
      });
    </script>
</head>
<body>
    <main class="terminal">

        <header class="session">
            <div class="line">
                <span class="prompt">$</span>
                <span class="cmd">./cuotas-m<span class="arg"> --info</span></span>
            </div>
            <div class="output">
                <div class="app-brand">
                    <span class="app-icon">🏘️</span>
                    <span class="app-name">Cuotas de Mantenimiento</span>
                </div>
                <div class="app-desc">Plataforma integral para la gestión de pagos y cobros en condominios</div>
                <nav class="nav-bar">
                    <a href="{{ '/' | relative_url }}" class="nav-link">Inicio</a>
                    <a href="{{ '/pages/sistema/' | relative_url }}" class="nav-link">Sistema</a>
                    <a href="{{ '/pages/iniciamos/' | relative_url }}" class="nav-link">Iniciar</a>
                    <a href="{{ '/pages/costos/' | relative_url }}" class="nav-link">Costos</a>
                    <a href="{{ '/pages/contacto/' | relative_url }}" class="nav-link">Contacto</a>
                </nav>
            </div>
        </header>

        <div class="page-content">
            {{ content }}
        </div>

        <footer class="session">
            <div class="line">
                <span class="prompt">$</span>
                <span class="cmd">uptime<span class="arg"></span></span>
            </div>
            <div class="output footer-text">
                <span class="cursor">█</span>
                <p class="copyright">© 2026 Cloud Empresarial — Santiago de Querétaro, México</p>
            </div>
        </footer>

    </main>
</body>
</html>
